# Head example:
#   NODE_TYPE=head HEAD_NODE_IP=10.0.0.80 VLLM_HOST_IP=10.0.0.80 \
#   HF_HOME=/path/to/huggingface/cache docker compose up --build
#
# Worker example:
#   NODE_TYPE=worker HEAD_NODE_IP=10.0.0.80 VLLM_HOST_IP=<WORKER_IP> \
#   HF_HOME=/path/to/huggingface/cache docker compose up --build
services:
  ray-node:
    build:
      context: .
      dockerfile: Dockerfile.ray
    image: ${VLLM_RAY_IMAGE:-vllm-openai-ray:local}
    container_name: ${CONTAINER_NAME:-vllm-ray-${NODE_TYPE:-node}}
    network_mode: host
    shm_size: ${SHM_SIZE:-10.24gb}
    gpus: all
    volumes:
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    environment:
      NODE_TYPE: ${NODE_TYPE:-}
      HEAD_NODE_IP: ${HEAD_NODE_IP:-}
      RAY_PORT: ${RAY_PORT:-6379}
      RAY_START_ARGS: ${RAY_START_ARGS:-}
      VLLM_HOST_IP: ${VLLM_HOST_IP:-}
      NCCL_SOCKET_IFNAME: ${NCCL_SOCKET_IFNAME:-}
      HF_TOKEN: ${HF_TOKEN:-}
      RAY_USAGE_STATS_ENABLED: ${RAY_USAGE_STATS_ENABLED:-0}
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        set -euo pipefail

        : "$${NODE_TYPE:?Set NODE_TYPE to head or worker}"
        : "$${HEAD_NODE_IP:?Set HEAD_NODE_IP to the Ray head node IP}"

        ray_port="$${RAY_PORT:-6379}"

        case "$${NODE_TYPE}" in
          head)
            exec ray start --block \
              --head \
              --node-ip-address="$${VLLM_HOST_IP}" \
              --port="$${ray_port}" \
              $${RAY_START_ARGS:-}
            ;;
          worker)
            exec ray start --block \
              --address="$${HEAD_NODE_IP}:$${ray_port}" \
              --node-ip-address="$${VLLM_HOST_IP}" \
              $${RAY_START_ARGS:-}
            ;;
          *)
            echo "NODE_TYPE must be 'head' or 'worker', got '$${NODE_TYPE}'" >&2
            exit 1
            ;;
        esac
